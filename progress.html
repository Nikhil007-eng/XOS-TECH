<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOS INT | Dev Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030303;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white;
            touch-action: manipulation;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .font-brand { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }

        .board-container {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: emerge 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes emerge {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .glitch-text {
            position: relative;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .glitch-text::after {
            content: 'INT';
            position: absolute;
            left: 2px;
            text-shadow: -1px 0 #ff003c;
            top: 0;
            background: transparent;
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: glitch 3s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% { clip: rect(10px, 9999px, 5px, 0); }
            10% { clip: rect(30px, 9999px, 40px, 0); }
            20% { clip: rect(0, 0, 0, 0); }
            100% { clip: rect(0, 0, 0, 0); }
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            width: 64%; /* Current dev progress */
            transition: width 2s ease;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.03), transparent);
            animation: scan 4s infinite linear;
            pointer-events: none;
        }

        @keyframes scan {
            from { left: -100%; }
            to { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="board-container">
        <div class="scan-line"></div>
        
        <div class="p-8 border-b border-white/[0.05] bg-white/[0.01]">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-2">
                    <div class="h-2 w-2 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308] animate-pulse"></div>
                    <div class="text-[9px] font-mono text-gray-500 uppercase tracking-widest">Protocol: Restricted</div>
                </div>
                <div class="text-[9px] font-mono text-blue-500/60 uppercase font-bold">403 // DEV</div>
            </div>
            
            <h1 class="font-brand text-3xl font-bold tracking-tighter mb-1">
                XOS <span class="glitch-text">INT</span>
            </h1>
            <p class="text-blue-500/70 text-[10px] font-mono uppercase tracking-[0.4em]">
                Secure Development
            </p>
        </div>

        <div class="p-8 bg-black/20">
            <h2 class="font-brand text-sm mb-4 tracking-[0.3em] text-gray-300 uppercase">Profile Status</h2>
            <p class="text-[11px] font-mono text-gray-500 leading-relaxed mb-8">
                This profile is currently undergoing <span class="text-blue-400">core synchronization</span>. 
                Interface modules are restricted until the build is finalized.
            </p>
            
            <div class="space-y-3">
                <div class="flex justify-between font-mono text-[9px] text-gray-500 uppercase">
                    <span>Synchronizing UI</span>
                    <span class="text-blue-400">64%</span>
                </div>
                <div class="w-full h-[2px] bg-white/5 rounded-full overflow-hidden">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-white/[0.05]">
                <p class="text-[10px] text-gray-600 italic mb-6">
                    "Tailoring the digital experience to the core user."
                </p>
                <button onclick="window.history.back()" class="w-full py-3 border border-white/10 rounded-lg text-[10px] font-brand tracking-[0.4em] text-gray-400 hover:text-white hover:bg-white/5 transition-all uppercase">
                    Return to Link
                </button>
            </div>
        </div>

        <div class="absolute bottom-0 right-0 w-12 h-12 bg-blue-600/5 [clip-path:polygon(100%_0,100%_100%,0_100%)]"></div>
    </div>

</body>
</html>
