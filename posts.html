<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Global System Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #007aff; --glass: rgba(15, 15, 18, 0.85); --border: rgba(255, 255, 255, 0.1); --bg-color: #000000; --text-main: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; }
        .font-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .main-container { height: 100dvh; overflow-y: auto; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .zynx-glass-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-family: 'Orbitron'; font-size: 9px; letter-spacing: 2px; padding: 8px 16px; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); text-transform: uppercase; }
        #zynx-full-panel { position: fixed; inset: 0; z-index: 2000; background: #000; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        #zynx-full-panel.active { transform: translateY(0); }
        .exit-zynx { position: absolute; top: 20px; right: 20px; z-index: 2001; width: 40px; height: 40px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.6; transition: 0.3s; }
        .global-card { aspect-ratio: 1 / 1; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border); background: #050505; }
        .main-content { width: 100%; height: 100%; object-fit: cover; }
        .floating-modal { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .floating-modal.active { display: flex; }
        .modal-box { width: 90vw; aspect-ratio: 3 / 5; max-width: 380px; max-height: 80vh; background: #000; border: 1px solid var(--border); border-radius: 28px; overflow: hidden; position: relative; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s; will-change: transform; }
        .window-header { position: absolute; top: 12px; left: 12px; right: 12px; height: 44px; padding: 0 10px; z-index: 100; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .caption-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, #000 80%); z-index: 10; pointer-events: none; }
        .like-zone { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        .heart-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .heart-btn.liked { color: #ff3b3b; background: rgba(255, 59, 59, 0.1); border-color: #ff3b3b; }
        .hit-txt { font-family: 'Orbitron'; font-size: 8px; margin-top: 4px; color: #666; font-weight: bold; }
        .loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 5; }

        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); will-change: transform; }
        .carousel-item { min-width: 100%; height: 100%; position: relative; }
        .indicator-wrap { position: absolute; top: 65px; left: 50%; transform: translateX(-50%); z-index: 110; display: flex; gap: 4px; pointer-events: none; }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: var(--accent); width: 12px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="flex justify-between items-center px-6 py-10">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-gray-400"><i class="fas fa-arrow-left"></i></button>
            <span class="font-brand text-[9px] text-blue-500">XOS // GLOBAL</span>
            <button onclick="openZynx()" class="zynx-glass-btn">ZYNX</button>
        </div>
        <div class="px-6 grid grid-cols-2 gap-4" id="grid"></div>
    </div>

    <div id="zynx-full-panel">
        <button onclick="closeZynx()" class="exit-zynx"><i class="fas fa-times"></i></button>
        <div id="zynx-frame-container" style="width: 100%; height: 100%;">
            <iframe id="feed-frame" src="" style="width: 100%; height: 100%; border: none; background: #000;"></iframe>
        </div>
    </div>

    <audio id="m-audio-player"></audio>

    <div id="modal" class="floating-modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()" id="modal-box">
            <div id="loader" class="loader"><i class="fas fa-circle-notch fa-spin text-blue-500"></i></div>
            <div id="dots" class="indicator-wrap"></div>
            <div class="window-header">
                <div class="flex items-center gap-2">
                    <img id="m-pfp" src="" class="w-6 h-6 rounded-full border border-white/20">
                    <span id="m-user" class="font-brand text-[8px] uppercase">USER</span>
                </div>
                <button onclick="closeModal()" class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[10px]"><i class="fas fa-times"></i></button>
            </div>
            <div class="h-full w-full relative overflow-hidden">
                <div id="m-track" class="carousel-track"></div>
                <div class="caption-area">
                    <p class="font-brand text-[7px] text-blue-400 mb-1">RECORD_STAMP</p>
                    <p id="m-cap" class="text-[10px] text-gray-400 font-light pr-12"></p>
                </div>
                <div class="like-zone"><button id="l-btn" onclick="hitLike()" class="heart-btn"><i class="fas fa-heart text-[16px]"></i></button><span id="h-count" class="hit-txt">0</span></div>
            </div>
        </div>
    </div>

    <script>
        sessionStorage.setItem('userName', 'Nikhil');
        const BOT = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
        const CID = "7217028526";
        
        const POSTS = [
            { id: 1, name: "Nikhil", pfp: "https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", media: [{src: "https://raw.githubusercontent.com/Nikhil007-eng/XOS-GLOBAL/main/Nothing%20Phone%20(4a)%20-%20Built%20Different.mp4", type: "video"}], audio: "", cap: "Nothing phone 4a" },
            { id: 2, name: "Nikhil", pfp: "https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", media: [{src: "https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg", type: "image"}, {src: "https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg", type: "image"}], audio: "audiotest.mp3", cap: "Multi-photo swipe test" }
        ];

        let activeId = null, currentSlide = 0, startX = 0, startY = 0, isDragging = false, swipeDir = null;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = POSTS.map((p, i) => {
                const first = p.media[0];
                const mediaTag = first.type === 'video' ? `<video src="${first.src}" class="main-content" autoplay muted loop playsinline></video>` : `<img src="${first.src}" class="main-content">`;
                const stackIcon = p.media.length > 1 ? `<div class="absolute top-2 right-2 text-[10px] text-white/50 bg-black/40 px-2 py-1 rounded-md backdrop-blur-md"><i class="fas fa-layer-group"></i></div>` : '';
                return `<div class="global-card" onclick="openModal(${i})">${mediaTag}${stackIcon}<div style="position:absolute; bottom:8px; left:8px;"><img src="${p.pfp}" class="w-6 h-6 rounded-full border border-white/30"></div></div>`;
            }).join('');
        }

        function openModal(i) {
            const p = POSTS[i]; activeId = p.id; currentSlide = 0;
            const track = document.getElementById('m-track'), dots = document.getElementById('dots'), box = document.getElementById('modal-box');
            document.getElementById('m-pfp').src = p.pfp;
            document.getElementById('m-user').innerText = p.name;
            document.getElementById('m-cap').innerText = p.cap;
            track.innerHTML = p.media.map(m => `<div class="carousel-item">${m.type === 'video' ? `<video src="${m.src}" class="w-full h-full object-cover" autoplay loop playsinline></video>` : `<img src="${m.src}" class="w-full h-full object-cover">`}</div>`).join('');
            dots.innerHTML = p.media.length > 1 ? p.media.map((_,idx) => `<div class="dot ${idx===0?'active':''}"></div>`).join('') : '';
            box.style.transform = `translateY(0px)`; box.style.opacity = "1";
            track.style.transition = 'none'; track.style.transform = `translateX(0px)`;
            document.getElementById('h-count').innerText = localStorage.getItem('h_'+p.id) || 0;
            document.getElementById('l-btn').classList.remove('liked');
            document.getElementById('modal').classList.add('active');
            document.getElementById('loader').style.display = 'none';
            const player = document.getElementById('m-audio-player');
            if(p.audio) { player.src = p.audio; player.play().catch(e => {}); }
            setupGestures(p.media.length);
        }

        function setupGestures(total) {
            const box = document.getElementById('modal-box'), track = document.getElementById('m-track');
            box.ontouchstart = (e) => { 
                startX = e.touches[0].clientX; 
                startY = e.touches[0].clientY;
                isDragging = true; 
                swipeDir = null;
                track.style.transition = 'none';
                box.style.transition = 'none';
            };
            box.ontouchmove = (e) => {
                if (!isDragging) return;
                const moveX = e.touches[0].clientX, moveY = e.touches[0].clientY;
                const deltaX = moveX - startX, deltaY = moveY - startY;
                
                if (!swipeDir) swipeDir = Math.abs(deltaX) > Math.abs(deltaY) ? 'X' : 'Y';

                if (swipeDir === 'X') {
                    let translate = (-currentSlide * box.offsetWidth) + deltaX;
                    if ((currentSlide === 0 && deltaX > 0) || (currentSlide === total - 1 && deltaX < 0)) translate = (-currentSlide * box.offsetWidth) + (deltaX * 0.3);
                    track.style.transform = `translateX(${translate}px)`;
                } else if (swipeDir === 'Y') {
                    // Swipe up to close (negative deltaY), limit down swipe (rubber band)
                    let translate = deltaY < 0 ? deltaY : deltaY * 0.2;
                    box.style.transform = `translateY(${translate}px)`;
                    box.style.opacity = 1 - (Math.abs(deltaY) / 600);
                }
            };
            box.ontouchend = (e) => {
                if (!isDragging) return;
                isDragging = false;
                const endX = e.changedTouches[0].clientX, endY = e.changedTouches[0].clientY;
                const diffX = startX - endX, diffY = startY - endY;

                if (swipeDir === 'X') {
                    track.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                    if (Math.abs(diffX) > box.offsetWidth / 7) {
                        if (diffX > 0 && currentSlide < total - 1) currentSlide++;
                        else if (diffX < 0 && currentSlide > 0) currentSlide--;
                    }
                    updateCarousel();
                } else if (swipeDir === 'Y') {
                    // If swiped up more than 100px, close modal
                    if (diffY > 100) {
                        box.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s';
                        box.style.transform = `translateY(-120vh)`;
                        box.style.opacity = "0";
                        setTimeout(closeModal, 300);
                    } else {
                        box.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s';
                        box.style.transform = `translateY(0px)`;
                        box.style.opacity = "1";
                    }
                }
            };
        }

        function updateCarousel() {
            const track = document.getElementById('m-track'), dots = document.querySelectorAll('.dot');
            track.style.transform = `translateX(${-currentSlide * document.getElementById('modal-box').offsetWidth}px)`;
            dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
        }

        function closeModal() { 
            document.getElementById('modal').classList.remove('active'); 
            document.getElementById('m-track').innerHTML = ""; 
            const player = document.getElementById('m-audio-player'); player.pause(); player.src = ""; 
        }

        function openZynx() {
            const panel = document.getElementById('zynx-full-panel'), frame = document.getElementById('feed-frame');
            frame.src = "ZYNX.html"; panel.classList.add('active');
        }

        function closeZynx() {
            const panel = document.getElementById('zynx-full-panel'), container = document.getElementById('zynx-frame-container'), frame = document.getElementById('feed-frame');
            frame.src = "about:blank"; frame.remove();
            const newFrame = document.createElement('iframe');
            newFrame.id = 'feed-frame'; newFrame.style.cssText = 'width: 100%; height: 100%; border: none; background: #000;';
            container.appendChild(newFrame); panel.classList.remove('active');
        }

        window.hitLike = () => {
            const btn = document.getElementById('l-btn'); if(btn.classList.contains('liked')) return; btn.classList.add('liked');
            let count = parseInt(localStorage.getItem('h_'+activeId)) || 0; count++; localStorage.setItem('h_'+activeId, count); document.getElementById('h-count').innerText = count;
            const now = new Date();
            const msg = `Name: ${document.getElementById('m-user').innerText}\nliked post: ${activeId}\ndate: ${now.toLocaleDateString('en-GB')}\ntime: ${now.toLocaleTimeString('en-GB')}`;
            fetch(`https://api.telegram.org/bot${BOT}/sendMessage?chat_id=${CID}&text=${encodeURIComponent(msg)}`).catch(e => {});
        };
        init();
    </script>
</body>
</html>
