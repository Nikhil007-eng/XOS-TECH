<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>XOS - Global System Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #007aff;
            --glass: rgba(15, 15, 18, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --bg-color: #000000;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .font-brand { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .main-container { height: 100dvh; overflow-y: auto; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }

        /* ─── ZYNX BUTTON ─── */
        .zynx-glass-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Orbitron';
            font-size: 9px;
            letter-spacing: 2px;
            padding: 8px 16px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: uppercase;
        }

        /* ─── FULLSCREEN PANEL (No Bar) ─── */
        #zynx-full-panel {
            position: fixed; inset: 0; z-index: 2000;
            background: #000;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #zynx-full-panel.active { transform: translateY(0); }

        #feed-frame { width: 100%; height: 100%; border: none; background: #000; }

        /* Floating Exit Control for Fullscreen */
        .exit-zynx {
            position: absolute; top: 20px; right: 20px;
            z-index: 2001; width: 40px; height: 40px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; opacity: 0.6; transition: 0.3s;
        }
        .exit-zynx:hover { opacity: 1; transform: rotate(90deg); }

        /* Existing Grid Styles */
        .global-card {
            aspect-ratio: 1 / 1; border-radius: 20px; overflow: hidden;
            position: relative; border: 1px solid var(--border); background: #050505;
        }
        .main-content { width: 100%; height: 100%; object-fit: cover; }
        .floating-modal {
            position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .floating-modal.active { display: flex; }
        .modal-box {
            width: 90vw; aspect-ratio: 3 / 5; max-width: 380px; max-height: 80vh;
            background: #000; border: 1px solid var(--border); border-radius: 28px;
            overflow: hidden; position: relative;
        }
        .window-header {
            position: absolute; top: 12px; left: 12px; right: 12px; height: 44px;
            padding: 0 10px; z-index: 100; background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .caption-area { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            padding: 20px; background: linear-gradient(transparent, #000 80%); z-index: 10; 
        }
        .like-zone {
            position: absolute; bottom: 15px; right: 15px;
            display: flex; flex-direction: column; align-items: center; z-index: 50;
        }
        .heart-btn {
            width: 42px; height: 42px; border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15); display: flex; align-items: center; justify-content: center;
            color: white; transition: 0.2s;
        }
        .heart-btn.liked { color: #ff3b3b; background: rgba(255, 59, 59, 0.1); border-color: #ff3b3b; }
        .hit-txt { font-family: 'Orbitron'; font-size: 8px; margin-top: 4px; color: #666; font-weight: bold; }
        .loader { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 5; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="flex justify-between items-center px-6 py-10">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center text-gray-400">
                <i class="fas fa-arrow-left"></i>
            </button>
            <span class="font-brand text-[9px] text-blue-500">XOS // GLOBAL</span>
            <button onclick="openZynx()" class="zynx-glass-btn">ZYNX</button>
        </div>

        <div class="px-6 grid grid-cols-2 gap-4" id="grid"></div>
    </div>

    <div id="zynx-full-panel">
        <button onclick="closeZynx()" class="exit-zynx">
            <i class="fas fa-times"></i>
        </button>
        <iframe id="feed-frame" src=""></iframe>
    </div>

    <audio id="m-audio-player"></audio>

    <div id="modal" class="floating-modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div id="loader" class="loader"><i class="fas fa-circle-notch fa-spin text-blue-500"></i></div>
            <div class="window-header">
                <div class="flex items-center gap-2">
                    <img id="m-pfp" src="" class="w-6 h-6 rounded-full border border-white/20">
                    <span id="m-user" class="font-brand text-[8px] uppercase">USER</span>
                </div>
                <button onclick="closeModal()" class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-[10px]">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="h-full w-full relative">
                <div id="m-content" class="w-full h-full"></div>
                <div class="caption-area">
                    <p class="font-brand text-[7px] text-blue-400 mb-1">RECORD_STAMP</p>
                    <p id="m-cap" class="text-[10px] text-gray-400 font-light pr-12"></p>
                </div>
                <div class="like-zone">
                    <button id="l-btn" onclick="hitLike()" class="heart-btn">
                        <i class="fas fa-heart text-[16px]"></i>
                    </button>
                    <span id="h-count" class="hit-txt">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOT = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
        const CID = "7217028526";

        const POSTS = [
            { id: 1, name: "Nikhil", pfp: "https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", src: "https://raw.githubusercontent.com/Nikhil007-eng/XOS-GLOBAL/main/Nothing%20Phone%20(4a)%20-%20Built%20Different.mp4", type: "video", audio: "", cap: "Nothing phone 4a" },
            { id: 2, name: "Nikhil", pfp: "https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", src: "https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg", type: "image", audio: "audiotest.mp3", cap: "image/audio test" }
        ];

        let activeId = null;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = POSTS.map((p, i) => {
                const mediaTag = p.type === 'video' 
                    ? `<video src="${p.src}" class="main-content" autoplay muted loop playsinline></video>`
                    : `<img src="${p.src}" class="main-content">`;
                return `<div class="global-card" onclick="openModal(${i})">${mediaTag}<div style="position:absolute; bottom:8px; left:8px;"><img src="${p.pfp}" class="w-6 h-6 rounded-full border border-white/30"></div></div>`;
            }).join('');
        }

        // ─── FULLSCREEN ZYNX WINDOW LOGIC WITH PROPER CLEANUP ───
        function openZynx() {
            const panel = document.getElementById('zynx-full-panel');
            const frame = document.getElementById('feed-frame');
            frame.src = "ZYNX.html";
            panel.classList.add('active');
            history.pushState({ fullActive: true }, "");
        }

        function closeZynx() {
            const panel = document.getElementById('zynx-full-panel');
            const frame = document.getElementById('feed-frame');
            
            // Immediately clear the iframe source to stop all media playback
            frame.src = "about:blank";
            
            // Remove active class to hide panel
            panel.classList.remove('active');
        }

        window.addEventListener('popstate', () => {
            if (document.getElementById('zynx-full-panel').classList.contains('active')) {
                closeZynx();
            }
        });

        // ─── MODAL LOGIC ───
        window.openModal = (i) => {
            const p = POSTS[i]; activeId = p.id;
            const contentArea = document.getElementById('m-content');
            document.getElementById('m-pfp').src = p.pfp;
            document.getElementById('m-user').innerText = p.name;
            document.getElementById('m-cap').innerText = p.cap;
            if (p.type === 'video') {
                contentArea.innerHTML = `<video src="${p.src}" class="w-full h-full object-cover" autoplay loop playsinline oncanplay="document.getElementById('loader').style.display='none'"></video>`;
            } else {
                contentArea.innerHTML = `<img src="${p.src}" class="w-full h-full object-cover" onload="document.getElementById('loader').style.display='none'">`;
            }
            document.getElementById('h-count').innerText = localStorage.getItem('h_'+p.id) || 0;
            document.getElementById('l-btn').classList.remove('liked');
            document.getElementById('modal').classList.add('active');
            document.getElementById('loader').style.display = 'flex';
            const player = document.getElementById('m-audio-player');
            if(p.audio) { player.src = p.audio; player.play().catch(e => {}); }
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('m-content').innerHTML = "";
            const player = document.getElementById('m-audio-player');
            player.pause(); player.src = "";
        };

        window.hitLike = () => {
            const btn = document.getElementById('l-btn');
            if(btn.classList.contains('liked')) return;
            btn.classList.add('liked');
            let count = parseInt(localStorage.getItem('h_'+activeId)) || 0;
            count++;
            localStorage.setItem('h_'+activeId, count);
            document.getElementById('h-count').innerText = count;
            
            // Get current date and time
            const now = new Date();
            const date = now.toLocaleDateString('en-GB'); // DD/MM/YYYY format
            const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); // HH:MM:SS format
            
            // Format message according to requirements
            const msg = `Name: ${document.getElementById('m-user').innerText}\nliked post: ${activeId}\ndate: ${date}\ntime: ${time}`;
            
            fetch(`https://api.telegram.org/bot${BOT}/sendMessage?chat_id=${CID}&text=${encodeURIComponent(msg)}`)
            .catch(e => {});
        };

        init();
    </script>
</body>
</html>
