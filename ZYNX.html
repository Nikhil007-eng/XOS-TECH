<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ZYNX — Powered by XOS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root { --bg: #000000; --accent: #007aff; --card: #0a0a0a; --border: #1a1a1a; --glass: rgba(10, 10, 10, 0.85); --text: #ffffff; --muted: #666666; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
#topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 60px; display: flex; flex-direction: column; justify-content: center; padding: 0 24px; background: linear-gradient(to bottom, var(--bg) 60%, transparent); pointer-events: none; }
.brand-zynx { font-size: 14px; font-weight: 700; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
.tagline-xos { font-size: 8px; font-weight: 500; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-top: 2px; }
#reel-wrap { width: 100%; height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; scrollbar-width: none; }
#reel-wrap::-webkit-scrollbar { display: none; }
.reel { width: 100%; height: 100dvh; flex-shrink: 0; position: relative; background: var(--bg); overflow: hidden; scroll-snap-align: start; scroll-snap-stop: always; }
.reel-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.reel::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); pointer-events: none; z-index: 1; }
.progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); z-index: 20; }
.progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s linear; }
.side-actions { position: absolute; right: 16px; bottom: 110px; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.act { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.act:active { transform: scale(0.85); }
.act-icon { width: 50px; height: 50px; border-radius: 50%; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text); }
.act-icon.liked { color: #ff3b5c; border-color: #ff3b5c; box-shadow: 0 0 15px rgba(255, 59, 92, 0.2); }
.act-label { font-size: 9px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
.reel-info { position: absolute; bottom: 0; left: 0; right: 80px; z-index: 10; padding: 0 24px 44px; }
.author-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.author-pfp { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); }
.author-name { font-weight: 600; font-size: 13px; letter-spacing: 0.5px; }
.reel-caption { font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.75); max-width: 90%; }
#vol-indicator { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 64px; height: 64px; background: var(--glass); border: 1px solid var(--border); border-radius: 50%; backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#vol-indicator.show { opacity: 1; }
.dtap-heart { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 20; pointer-events: none; }
.dtap-heart i { font-size: 80px; color: #fff; opacity: 0; transform: scale(0.5); }
.dtap-heart i.pop { animation: heartPop 0.7s forwards; }
@keyframes heartPop { 0% { opacity: 0; transform: scale(0.5); } 30% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; transform: scale(1); } }
</style>
</head>
<body>
<div id="topbar"><span class="brand-zynx">ZYNX</span><span class="tagline-xos">Powered by XOS</span></div>
<div id="reel-wrap"><div id="reel-track"></div></div>
<div id="vol-indicator"><i class="fas fa-volume-up"></i></div>
<script>
const TG_BOT = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
const TG_CID = "7217028526";
const EXTRACTED_USER = sessionStorage.getItem('userName') || "Guest User";

const POSTS = [
  { id: 1, user: { name: "NIKHIL", pfp: "https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", url: "https://nikhil007-eng.github.io/Developer-xos-/Nikhilprof.html" }, src: "https://raw.githubusercontent.com/Nikhil007-eng/XOS-GLOBAL/main/Nothing%20Phone%20(4a)%20-%20Built%20Different.mp4", type: "video", caption: "Nothing Phone (4a) — Built different.", likes: 1 },
  { id: 2, user: { name: "NIKHIL", pfp: "https://nikhil007-eng.github.io/Developer-xos-/file_00000000f4f47208a731ff7b47a3b568.png", url: "https://nikhil007-eng.github.io/Developer-xos-/Nikhilprof.html" }, src: "https://nikhil007-eng.github.io/Developer-xos-/Picsart_26-02-28_14-41-10-477.jpg", type: "image", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", caption: "Late night edits hit different.", likes: 1 }
];

let muted = true; let hasInteracted = false; let liked = JSON.parse(localStorage.getItem('xos_liked_v2') || '{}');
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const video = entry.target.querySelector('video'), audio = entry.target.querySelector('audio'), bar = entry.target.querySelector('.progress-bar');
        if (entry.isIntersecting) {
            if (video) { video.currentTime = 0; video.play().catch(() => {}); video.ontimeupdate = () => bar.style.width = (video.currentTime / video.duration * 100) + '%'; }
            if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); audio.ontimeupdate = () => bar.style.width = (audio.currentTime / audio.duration * 100) + '%'; }
        } else {
            if (video) { video.pause(); video.ontimeupdate = null; }
            if (audio) { audio.pause(); audio.ontimeupdate = null; }
        }
    });
}, { threshold: 0.7 });

function build() {
  const track = document.getElementById('reel-track');
  POSTS.forEach((p, i) => {
    const isLiked = liked[p.id], reel = document.createElement('div'); reel.className = 'reel';
    let mediaHtml = p.type === 'video' ? `<video src="${p.src}" class="reel-media" loop playsinline muted></video>` : `<img src="${p.src}" class="reel-media">${p.audio ? `<audio src="${p.audio}" loop muted></audio>` : ''}`;
    reel.innerHTML = `${mediaHtml}<div class="progress-container"><div class="progress-bar"></div></div><div class="dtap-heart"><i class="fas fa-heart"></i></div><div class="side-actions"><div class="act" onclick="toggleLike(${i}, ${p.id})"><div class="act-icon ${isLiked ? 'liked' : ''}" id="like-icon-${i}"><i class="fas fa-heart"></i></div><span class="act-label" id="like-count-${i}">${fmt(p.likes + (isLiked ? 1 : 0))}</span></div><div class="act" onclick="handleShare()"><div class="act-icon"><i class="fas fa-arrow-up-right-from-square"></i></div><span class="act-label">Share</span></div></div><div class="reel-info"><div class="author-row"><img src="${p.user.pfp}" class="author-pfp"><span class="author-name">${p.user.name}</span></div><p class="reel-caption">${p.caption}</p></div>`;
    track.appendChild(reel); observer.observe(reel);
    reel.addEventListener('click', (e) => {
        if (!hasInteracted) activateAudio(); if (e.target.closest('.side-actions')) return;
        let tapCount = (reel.dataset.taps || 0) * 1 + 1; reel.dataset.taps = tapCount;
        if (tapCount === 1) setTimeout(() => { if (reel.dataset.taps == 1) toggleMute(); reel.dataset.taps = 0; }, 250);
        else { if (!liked[p.id]) toggleLike(i, p.id); triggerDtap(reel); reel.dataset.taps = 0; }
    });
  });
}
function activateAudio() { hasInteracted = true; muted = false; document.querySelectorAll('video, audio').forEach(m => { m.muted = false; m.play().catch(()=>{}); }); }
function toggleMute() { muted = !muted; document.querySelectorAll('video, audio').forEach(m => m.muted = muted); const indicator = document.getElementById('vol-indicator'); indicator.innerHTML = muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>'; indicator.classList.add('show'); setTimeout(() => indicator.classList.remove('show'), 800); }
function sendTg(postId) {
    const now = new Date(), dateStr = now.toLocaleDateString('en-GB'), timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    const message = `🌟 ZYNX INTERACTION\nName: ${EXTRACTED_USER}\nLiked ZYNX: 1 (Post ID: ${postId})\nDate: ${dateStr}\nTime: ${timeStr}`.trim();
    fetch(`https://api.telegram.org/bot${TG_BOT}/sendMessage?chat_id=${TG_CID}&text=${encodeURIComponent(message)}`).catch(() => {});
}
function toggleLike(idx, postId) { liked[postId] = !liked[postId]; localStorage.setItem('xos_liked_v2', JSON.stringify(liked)); document.getElementById(`like-icon-${idx}`).classList.toggle('liked', liked[postId]); document.getElementById(`like-count-${idx}`).textContent = fmt(POSTS[idx].likes + (liked[postId] ? 1 : 0)); if (liked[postId]) sendTg(postId); }
function triggerDtap(el) { const heart = el.querySelector('.dtap-heart i'); heart.classList.remove('pop'); void heart.offsetWidth; heart.classList.add('pop'); }
function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'k' : n; }
function handleShare() { if (navigator.share) navigator.share({ title: 'ZYNX', url: window.location.href }); }
build();
document.getElementById('reel-wrap').addEventListener('scroll', () => { if(!hasInteracted) activateAudio(); }, {once: true});
</script>
</body>
</html>
