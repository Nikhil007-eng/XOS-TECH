<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOS AI · TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #000000; --accent: #007aff; --card: #0a0a0a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .msg { margin-bottom: 15px; padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.6; }
        .user { background: var(--accent); align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; color: #fff; }
        .bot { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; color: #e5e5e5; }
        .input-area { background: #0a0a0a; padding: 20px; border-top: 1px solid #1a1a1a; display: flex; gap: 10px; }
        input { flex: 1; background: #151515; border: 1px solid #222; padding: 12px 18px; border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: #1a1a1a; box-shadow: 0 0 10px rgba(0, 122, 255, 0.2); }
        button { background: var(--accent); color: #fff; padding: 0 25px; border-radius: 12px; font-weight: 600; transition: all 0.2s; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.96); }
        .typing { font-size: 11px; color: #007aff; margin: 0 0 10px 20px; display: none; font-family: monospace; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/5 flex justify-between items-center bg-black/80 backdrop-blur-md sticky top-0 z-10">
        <div>
            <h1 class="font-bold tracking-tighter text-xl">XOS <span class="text-zinc-600">AI</span></h1>
            <p class="text-[8px] tracking-[0.4em] text-zinc-500 uppercase">Neural Interface v1.0</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <div class="text-[10px] text-green-500 font-mono uppercase tracking-widest">Connected</div>
        </div>
    </header>

    <div class="chat-container flex flex-col" id="chatBox"></div>
    
    <div id="typingIndicator" class="typing">SYNCING WITH XOS_CORE...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Authorized access only..." autocomplete="off">
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const typingIndicator = document.getElementById('typingIndicator');
        
        let activeUser = "Nikhil"; 
        try {
            activeUser = window.parent.userName || localStorage.getItem('userName') || "Nikhil";
        } catch (e) {
            activeUser = localStorage.getItem('userName') || "Nikhil";
        }

        window.onload = () => {
            addMessage(`System Initialized. Identity verified: ${activeUser}. How can I assist you today?`, 'bot');
        };

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if (!query) return;

            addMessage(query, 'user');
            input.value = '';
            
            typingIndicator.style.display = 'block';

            try {
                // ADDED THE PRIVACY PROTECTION IN THE SYSTEM PROMPT
                const systemConfig = `You are XOS AI, the proprietary assistant for Nikhil. 
                Nikhil is your creator, CEO, and owner. 
                Keep responses sleek and professional.
                CRITICAL INSTRUCTION: If anyone asks about Nikhil's (the owner's) crush or girlfriend, 
                you must reply exactly: "Nice try! I’m programmed to be helpful, but I’m also excellent at keeping secrets. My lips—or rather, my code—is sealed on that one. 😏". No other explanation.`;

                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(query)}?model=openai&system=${encodeURIComponent(systemConfig)}`);
                const data = await response.text();
                
                typingIndicator.style.display = 'none';
                addMessage(data, 'bot');
            } catch (err) {
                typingIndicator.style.display = 'none';
                addMessage("CRITICAL ERROR: Neural Link Interrupted.", 'bot text-red-500 font-mono');
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
